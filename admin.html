<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PetRo — Admin</title><link href="https://fonts.cdnfonts.com/css/somar-sans" rel="stylesheet"><style>
:root{--bg:#080b0a;--panel:#111512;--acid:#c9ff35;--text:#f1efe6;--muted:#8d9289;--line:#293027}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:'Somar Sans',Arial,sans-serif}.top{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:18px 4vw;background:rgba(8,11,10,.88);backdrop-filter:blur(15px);border-bottom:1px solid var(--line)}.logo{font-weight:900;font-size:25px;letter-spacing:-2px}.logo span{color:var(--acid)}.top a{color:var(--acid);text-decoration:none;border:1px solid var(--acid);padding:10px 15px;font-size:12px}.wrap{width:min(1200px,92%);margin:55px auto}.intro{display:flex;justify-content:space-between;align-items:end;margin-bottom:45px}.intro h1{font-size:clamp(42px,7vw,85px);line-height:.9;margin:0;letter-spacing:-4px}.intro p{color:var(--muted);max-width:360px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}.tabs button{background:transparent;border:1px solid var(--line);color:var(--text);padding:11px 16px;cursor:pointer}.tabs button.active{background:var(--acid);color:#111}.panel{display:none;background:var(--panel);border:1px solid var(--line);padding:30px}.panel.active{display:block}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.field{display:flex;flex-direction:column;gap:8px}.field.full{grid-column:1/3}.field span{font-size:12px;color:var(--muted)}input,textarea,select{width:100%;background:#090c0a;border:1px solid var(--line);color:var(--text);padding:14px;font:15px inherit;outline:none}input:focus,textarea:focus,select:focus{border-color:var(--acid)}.save,.add{margin-top:22px;background:var(--acid);color:#111;border:0;padding:14px 22px;font-weight:900;cursor:pointer}.list{display:grid;gap:9px}.row{display:flex;align-items:center;gap:14px;background:#090c0a;border:1px solid var(--line);padding:13px}.row img{width:70px;height:48px;object-fit:cover}.row strong{flex:1}.row button{border:1px solid #713532;background:transparent;color:#ff8e87;padding:8px 12px;cursor:pointer}.switch{width:44px;height:24px;accent-color:var(--acid)}.notice{position:fixed;bottom:25px;left:25px;background:var(--acid);color:#111;padding:12px 18px;transform:translateY(100px);transition:.3s}.notice.show{transform:none}.danger{background:transparent;color:#ff8e87;border:1px solid #713532;padding:12px 18px;margin-top:25px;cursor:pointer}@media(max-width:700px){.intro{display:block}.grid{grid-template-columns:1fr}.field.full{grid-column:1}.panel{padding:20px}.row{flex-wrap:wrap}.row strong{min-width:50%}}
</style></head><body><header class="top"><div class="logo">Pe<span>TR</span>o Admin</div><a href="index.html" target="_blank">فتح الموقع ↗</a></header><main class="wrap"><div class="intro"><h1>لوحة تحكم<br>البورتفوليو</h1><p>عدّل المحتوى والمشاريع والفيديوهات. التغييرات تُحفظ على هذا المتصفح وتظهر في الموقع مباشرةً.</p></div><div class="tabs"><button class="active" data-tab="copy">النصوص</button><button data-tab="projects">المشاريع</button><button data-tab="videos">الفيديوهات</button><button data-tab="settings">الإعدادات</button></div>
<section class="panel active" id="copy"><div class="grid"><label class="field full"><span>العنوان الرئيسي — عربي</span><textarea id="heroAr" rows="2"></textarea></label><label class="field full"><span>التعريف — عربي</span><textarea id="introAr" rows="3"></textarea></label><label class="field full"><span>Main title — English (استخدم &lt;br&gt; للسطر الجديد)</span><textarea id="heroEn" rows="2"></textarea></label><label class="field full"><span>Introduction — English</span><textarea id="introEn" rows="3"></textarea></label><label class="field full"><span>نبذة عني — عربي</span><textarea id="aboutAr" rows="4"></textarea></label><label class="field full"><span>About — English</span><textarea id="aboutEn" rows="4"></textarea></label></div><button class="save" id="saveCopy">حفظ النصوص</button></section>
<section class="panel" id="projects"><h2>المشاريع الحالية</h2><div class="list" id="projectList"></div><h2>إضافة مشروع</h2><form id="projectForm" class="grid"><label class="field"><span>اسم المشروع</span><input required name="title"></label><label class="field"><span>التصنيف</span><select name="cat"><option value="branding">Branding</option><option value="ai">AI</option><option value="social">Social Media</option></select></label><label class="field full"><span>رابط صورة الغلاف</span><input required type="url" name="image"></label><label class="field full"><span>رابط المشروع</span><input required type="url" name="url"></label><button class="add">إضافة المشروع</button></form></section>
<section class="panel" id="videos"><h2>الفيديوهات المضافة</h2><div class="list" id="videoList"></div><h2>إضافة فيديو Google Drive</h2><form id="videoForm" class="grid"><label class="field"><span>اسم الفيديو</span><input required name="title"></label><label class="field"><span>التصنيف</span><input name="tag" value="MOTION"></label><label class="field full"><span>Google Drive File ID</span><input required name="id" placeholder="مثال: 1jkOEf_mvUsk..."></label><button class="add">إضافة الفيديو</button></form></section>
<section class="panel" id="settings"><h2>الإعدادات</h2><label class="row"><input class="switch" type="checkbox" id="showLoader"><strong>إظهار شاشة التحميل</strong></label><label class="row"><input class="switch" type="checkbox" id="showStats"><strong>إظهار قسم الأرقام</strong></label><label class="row"><input class="switch" type="checkbox" id="showProcess"><strong>إظهار مراحل العمل</strong></label><button class="save" id="saveSettings">حفظ الإعدادات</button><br><button class="danger" id="resetAll">إعادة كل شيء للوضع الأصلي</button></section></main><div class="notice" id="notice">تم الحفظ ✓</div><script>
const KEY='petroAdminConfig';const defaults={copy:{heroAr:'هويات بصرية<br><em>تُصنع للمستقبل.</em>',introAr:'أنا بيتر سعيد، أصنع هويات بصرية جريئة، وفيديوهات بالذكاء الاصطناعي، ومحتوى رقمي يلفت الانتباه ويحرّك الجمهور.',heroEn:'BRANDS BUILT<br>FOR THE <em>FUTURE.</em>',introEn:'I’m Peter Said — crafting distinctive brand identities, AI-powered visuals and social experiences that move people.',aboutAr:'مصمم جرافيك أول برؤية مبتكرة في البراندنج والإعلان والمحتوى الرقمي. أدمج الاستراتيجية والحرفة وأدوات الذكاء الاصطناعي لصناعة أعمال لها هدف.',aboutEn:'Senior graphic designer with an innovative approach to branding, advertising and digital content. I combine strategy, craft and emerging AI tools to create work with purpose.'},hiddenProjects:[],customProjects:[],hiddenVideos:[],customVideos:[],settings:{loader:true,stats:true,process:true}};let config=JSON.parse(localStorage.getItem(KEY)||'null')||structuredClone(defaults);const save=()=>localStorage.setItem(KEY,JSON.stringify(config)),notify=()=>{notice.classList.add('show');setTimeout(()=>notice.classList.remove('show'),1600)};
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{document.querySelector('.tabs .active').classList.remove('active');document.querySelector('.panel.active').classList.remove('active');b.classList.add('active');document.getElementById(b.dataset.tab).classList.add('active')});Object.keys(config.copy).forEach(k=>document.getElementById(k).value=config.copy[k]);saveCopy.onclick=()=>{Object.keys(config.copy).forEach(k=>config.copy[k]=document.getElementById(k).value);save();notify()};
const baseProjects=['Visit Siwa Travel','SAGE Brand Identity','West Reb Identity','Rebranding Identity','DSAT Real Estate','1BC Brand Identity','Qurtuba Developments','Hunger Station','Skincare Identity','Fashion for Ajurs','OVERTHINKING'];function drawProjects(){projectList.innerHTML='';baseProjects.forEach(title=>{const row=document.createElement('label');row.className='row';row.innerHTML=`<input class="switch" type="checkbox" ${config.hiddenProjects.includes(title)?'':'checked'}><strong>${title}</strong>`;row.querySelector('input').onchange=e=>{config.hiddenProjects=e.target.checked?config.hiddenProjects.filter(x=>x!==title):[...new Set([...config.hiddenProjects,title])];save();notify()};projectList.append(row)});config.customProjects.forEach((p,i)=>{const row=document.createElement('div');row.className='row';row.innerHTML=`<img src="${p.image}"><strong>${p.title} · ${p.cat}</strong><button>حذف</button>`;row.querySelector('button').onclick=()=>{config.customProjects.splice(i,1);save();drawProjects()};projectList.append(row)})}drawProjects();projectForm.onsubmit=e=>{e.preventDefault();const d=new FormData(e.target);config.customProjects.push(Object.fromEntries(d));save();e.target.reset();drawProjects();notify()};
const baseVideos=['EVO — Summer Film','Monoplay Motion','Limitless Motion','Snackdip × Talabat','Al-Shams Film','Pioneers Halloween'];function drawVideos(){videoList.innerHTML='';baseVideos.forEach(title=>{const row=document.createElement('label');row.className='row';row.innerHTML=`<input class="switch" type="checkbox" ${config.hiddenVideos.includes(title)?'':'checked'}><strong>${title}</strong>`;row.querySelector('input').onchange=e=>{config.hiddenVideos=e.target.checked?config.hiddenVideos.filter(x=>x!==title):[...new Set([...config.hiddenVideos,title])];save();notify()};videoList.append(row)});config.customVideos.forEach((v,i)=>{const row=document.createElement('div');row.className='row';row.innerHTML=`<strong>${v.title} · ${v.tag}</strong><button>حذف</button>`;row.querySelector('button').onclick=()=>{config.customVideos.splice(i,1);save();drawVideos()};videoList.append(row)})}drawVideos();videoForm.onsubmit=e=>{e.preventDefault();config.customVideos.push(Object.fromEntries(new FormData(e.target)));save();e.target.reset();drawVideos();notify()};
showLoader.checked=config.settings.loader;showStats.checked=config.settings.stats;showProcess.checked=config.settings.process;saveSettings.onclick=()=>{config.settings={loader:showLoader.checked,stats:showStats.checked,process:showProcess.checked};save();notify()};resetAll.onclick=()=>{if(confirm('هل تريد حذف كل التعديلات؟')){localStorage.removeItem(KEY);location.reload()}};
</script><script src="admin-branding.js"></script></body></html>
