<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Project — Petro Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Somar+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script>document.documentElement.dataset.theme=localStorage.getItem('petroTheme')||'dark'</script>
  <style>
    :root{--acid:#c9ff35;--ink:#070a09;--paper:#f4f2e9;--line:rgba(255,255,255,.16)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--ink);color:var(--paper);font-family:Inter,Arial,sans-serif}a{color:inherit;text-decoration:none}::selection{background:var(--acid);color:var(--ink)}header{position:fixed;inset:0 0 auto;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:18px 4vw;border-bottom:1px solid var(--line);background:rgba(7,10,9,.72);backdrop-filter:blur(16px)}.brand{width:118px;height:46px;overflow:hidden;position:relative}.brand img{position:absolute;width:180px;height:180px;left:50%;top:50%;transform:translate(-50%,-50%);object-fit:contain;filter:invert(1) grayscale(1) brightness(2.6);mix-blend-mode:screen}.back{font:10px monospace;letter-spacing:1px}.back:hover{color:var(--acid)}.hero{position:relative;min-height:100vh;display:flex;align-items:end;padding:120px 5vw 7vw;overflow:hidden}.heroImage{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(.82)}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.12),rgba(0,0,0,.92) 92%)}.heroCopy{position:relative;z-index:2;width:100%}.eyebrow{display:flex;justify-content:space-between;gap:20px;color:var(--acid);font:10px monospace;letter-spacing:2px}.hero h1{max-width:1100px;margin:25px 0 0;font-size:clamp(58px,11vw,170px);line-height:.76;letter-spacing:-.075em}.summary{display:grid;grid-template-columns:1.25fr .75fr;gap:10vw;padding:110px 7vw}.summary h2{margin:0;font-size:clamp(34px,5vw,72px);line-height:.95;letter-spacing:-.05em}.summary p{margin:0;color:#a6aaa3;font-size:17px;line-height:1.8}.facts{display:grid;grid-template-columns:repeat(4,1fr);border-block:1px solid var(--line)}.facts div{padding:42px 4vw;border-right:1px solid var(--line)}.facts div:last-child{border:0}.facts small{display:block;color:#747870;font:9px monospace;margin-bottom:12px}.facts b{font-size:15px}.visual{margin:0;padding:8vw 5vw;background:#0d100f}.visual img{display:block;width:100%;max-height:86vh;object-fit:cover}.visualMeta{display:flex;justify-content:space-between;margin-top:16px;color:#777b74;font:9px monospace;letter-spacing:1px}.process{padding:110px 7vw}.process>small{color:var(--acid);font:9px monospace;letter-spacing:2px}.steps{display:grid;grid-template-columns:repeat(4,1fr);margin-top:45px;border-top:1px solid var(--line)}.steps article{min-height:250px;padding:28px;border-right:1px solid var(--line)}.steps article:last-child{border:0}.steps b{color:var(--acid);font:10px monospace}.steps h3{margin-top:80px;font-size:25px}.steps p{color:#898d86;font-size:12px;line-height:1.6}.cta{padding:120px 5vw;text-align:center;background:var(--paper);color:var(--ink)}.cta p{font:10px monospace;letter-spacing:2px}.cta h2{margin:25px auto 45px;max-width:1000px;font-size:clamp(48px,9vw,130px);line-height:.8;letter-spacing:-.075em}.cta a{display:inline-block;padding:18px 24px;background:var(--ink);color:var(--paper);font-size:11px;font-weight:800}.cta a:hover{background:var(--acid);color:var(--ink)}.missing{min-height:100vh;display:grid;place-items:center;text-align:center;padding:30px}.missing a{color:var(--acid)}
    .behanceProject{padding:100px 4vw;background:#111}.behanceProjectHead{display:flex;align-items:end;justify-content:space-between;gap:25px;max-width:1400px;margin:0 auto 30px}.behanceProjectHead small{color:var(--acid);font:9px monospace;letter-spacing:2px}.behanceProjectHead h2{margin:12px 0 0;font-size:clamp(38px,6vw,82px);line-height:.88;letter-spacing:-.055em}.behanceProjectHead p{max-width:430px;color:#999d96;line-height:1.65}.behanceFrame{display:block;width:100%;max-width:1400px;height:clamp(900px,125vw,1900px);margin:auto;border:0;background:#fff}.siwaFull .behanceFrame{height:2400px}.siwaFull{padding-top:75px}.siwaFull .behanceProjectHead h2{color:var(--acid)}
    .localCase{padding:90px 0 0;background:#0b0d0c}.localCaseHead{display:flex;align-items:end;justify-content:space-between;gap:28px;padding:0 5vw 45px}.localCaseHead small{font:9px monospace;letter-spacing:2px;color:#f2c078}.localCaseHead h2{font-size:clamp(46px,8vw,118px);line-height:.8;letter-spacing:-.065em;margin:14px 0 0}.localCaseHead p{max-width:460px;color:#989c95;line-height:1.7}.siwaGallery{display:grid;grid-template-columns:1fr;background:#050605}.siwaMedia{margin:0;position:relative;overflow:hidden;background:#121412}.siwaMedia img,.siwaMedia video{display:block;width:100%;height:auto;border:0}.siwaMedia video{max-height:95vh;background:#000;object-fit:contain}.siwaMedia img{transform:scale(1.015);opacity:.18;transition:opacity .75s ease,transform 1.2s cubic-bezier(.16,1,.3,1)}.siwaMedia.in img{opacity:1;transform:none}.siwaMedia figcaption{position:absolute;left:24px;bottom:20px;padding:8px 11px;background:rgba(0,0,0,.58);color:#fff;font:8px monospace;letter-spacing:1.5px;opacity:0;transition:.3s}.siwaMedia:hover figcaption{opacity:1}.siwaMedia+.siwaMedia{border-top:2px solid #050605}
    [dir="rtl"] body{font-family:"Somar Sans",Tahoma,sans-serif}[dir="rtl"] .facts div{border-right:0;border-left:1px solid var(--line)}
    .headerActions{display:flex;align-items:center;gap:16px}.themeBtn{width:42px;height:42px;border:1px solid var(--line);border-radius:50%;display:grid;place-items:center;background:transparent;color:inherit;font-size:16px;cursor:pointer;transition:.25s}.themeBtn:hover{background:var(--acid);border-color:var(--acid);color:var(--ink);transform:rotate(12deg)}
    [data-theme="light"] body{background:#f5f2e9;color:#151713}[data-theme="light"] header{background:rgba(245,242,233,.88);border-color:rgba(21,23,19,.16)}[data-theme="light"] .brand img{filter:none;mix-blend-mode:multiply}[data-theme="light"] .summary p,[data-theme="light"] .steps p{color:#555a52}[data-theme="light"] .facts{border-color:rgba(21,23,19,.18)}[data-theme="light"] .facts div,[data-theme="light"] .steps article{border-color:rgba(21,23,19,.18)}[data-theme="light"] .facts small,[data-theme="light"] .visualMeta{color:#5e635b}[data-theme="light"] .process{background:#f5f2e9}[data-theme="light"] .localCase{background:#eee9dd;color:#151713}[data-theme="light"] .localCaseHead p{color:#555a52}[data-theme="light"] .themeBtn{border-color:rgba(21,23,19,.25)}[data-theme="light"] .hero{color:#fff}
    @media(max-width:760px){header{padding:12px 5vw}.brand{width:82px;height:40px}.brand img{width:135px;height:135px}.hero{min-height:82vh}.eyebrow{flex-direction:column}.hero h1{font-size:16vw}.summary{grid-template-columns:1fr;gap:30px;padding:75px 6vw}.facts{grid-template-columns:1fr 1fr}.facts div:nth-child(2){border-right:0}.facts div:nth-child(-n+2){border-bottom:1px solid var(--line)}.steps{grid-template-columns:1fr 1fr}.steps article:nth-child(2){border-right:0}.steps article:nth-child(-n+2){border-bottom:1px solid var(--line)}.steps h3{margin-top:45px}.visual{padding:7vw 4vw}.visual img{min-height:55vh}.behanceProject{padding:70px 0}.behanceProjectHead{display:block;padding:0 5vw}.behanceProjectHead p{margin-top:22px}.behanceFrame{height:1600px}.localCase{padding-top:62px}.localCaseHead{display:block;padding-bottom:28px}.localCaseHead p{margin-top:24px}.siwaMedia figcaption{display:none}.siwaMedia video{max-height:70vh}}
  </style>
</head>
<body>
  <header><a class="brand petroLogo" href="index.html" aria-label="Petro home"><img src="my logo.png" alt="Petro Designer"></a><div class="headerActions"><button class="themeBtn" id="themeBtn" type="button" aria-label="Switch color theme">☀</button><a class="back" href="index.html#work">← BACK TO PROJECTS</a></div></header>
  <main id="project"></main>
  <script>
    const projects={
      'visit-siwa-travel':{title:'Visit Siwa Travel',type:'Travel Brand Identity',year:'2026',image:'https://mir-s3-cdn-cf.behance.net/projects/404/c2cba6250160241.Y3JvcCw4MDgsNjMyLDAsMA.png',behance:'https://www.behance.net/gallery/250160241/Visit-Siwa-Travel-Brand-Identity',brief:'A complete visual identity created to express Siwa’s distinctive character through a contemporary travel brand.',challenge:'The challenge was to balance the authenticity of Siwa with a clear, modern system that works across tourism touchpoints.'},
      'sage-brand-identity':{title:'SAGE Brand Identity',type:'Strategic Brand System',year:'2026',image:'https://mir-s3-cdn-cf.behance.net/projects/404/374b41246552875.Y3JvcCw4MDgsNjMyLDAsMA.png',behance:'https://www.behance.net/gallery/246552875/SAGE-Brand-identity',brief:'A refined identity system designed for clarity, consistency and confident brand communication.',challenge:'The visual language needed to feel premium and calm while remaining flexible across digital and printed applications.'},
      'west-reb-identity':{title:'West Reb Identity',type:'Real Estate Branding',year:'2025',image:'https://mir-s3-cdn-cf.behance.net/projects/404/c59e35238525745.Y3JvcCwzOTk1LDMxMjUsMTY4LDA.png',behance:'https://www.behance.net/gallery/238525745/west-reb-Brand-Identity',brief:'A bold real-estate identity built to communicate trust, ambition and modern living.',challenge:'The brand required a memorable contemporary presence without losing the credibility expected in real estate.'},
      'rebranding-identity':{title:'Rebranding Identity',type:'Brand Refresh',year:'2025',image:'https://mir-s3-cdn-cf.behance.net/projects/404/b698e2236425173.Y3JvcCwyMDcxLDE2MjAsNDA1LDA.png',behance:'https://www.behance.net/gallery/236425173/Rebranding-Brand-Identity',brief:'A complete identity refresh that turns an existing brand into a sharper and more consistent visual system.',challenge:'Preserve recognition while creating enough visual change to signal a new chapter for the business.'},
      'dsat-real-estate':{title:'DSAT Real Estate',type:'Real Estate Identity',year:'2025',image:'https://mir-s3-cdn-cf.behance.net/projects/404/ef5b54237714435.Y3JvcCwxMTk0LDkzNCwxMDMsMA.png',behance:'https://www.behance.net/gallery/237714435/Dsat-Real-Estate-Brand-Identity',brief:'A modern identity designed to give a real-estate business a confident and recognizable market presence.',challenge:'Create a system that communicates stability and ambition across corporate and sales materials.'},
      '1bc-brand-identity':{title:'1BC Brand Identity',type:'Brand Identity',year:'2025',image:'https://mir-s3-cdn-cf.behance.net/projects/404/610586232823625.Y3JvcCw4MDgsNjMyLDAsMA.png',behance:'https://www.behance.net/gallery/232823625/1BC-Brand-identity',brief:'A flexible visual identity built around a distinctive core mark and a consistent communication system.',challenge:'Build a recognizable visual language that remains strong across small and large brand applications.'},
      'qurtuba-developments':{title:'Qurtuba Developments',type:'Real Estate Branding',year:'2025',image:'https://mir-s3-cdn-cf.behance.net/projects/404/bf1cb2227911209.Y3JvcCw4MDgsNjMyLDAsMA.png',behance:'https://www.behance.net/gallery/227911209/Qurtuba-developments-Brand-Identity',brief:'A development brand identity combining architectural confidence with an approachable visual character.',challenge:'Translate the developer’s values into a scalable system for marketing, signage and digital communication.'},
      'hunger-station':{title:'Hunger Station',type:'Identity & Packaging',year:'2026',image:'https://mir-s3-cdn-cf.behance.net/projects/404/033a94245087451.Y3JvcCw5OTgsNzgxLDIwMCww.png',behance:'https://www.behance.net/gallery/245087451/Hunger-Station-identity-Packaging-Fried-Chicken',brief:'An energetic fried-chicken identity and packaging system created to stand out in a competitive food market.',challenge:'Make the brand feel bold, appetizing and instantly recognizable across every delivery touchpoint.'},
      'skincare-identity':{title:'Skincare Identity',type:'Cosmetics Packaging',year:'2025',image:'https://mir-s3-cdn-cf.behance.net/projects/404/8194aa229304933.Y3JvcCw4MDgsNjMyLDAsMA.png',behance:'https://www.behance.net/gallery/229304933/Skincare-Identity-cosmetics-Packaging',brief:'A clean skincare identity and packaging direction balancing scientific trust with contemporary beauty.',challenge:'Create shelf presence while keeping the system elegant, clear and easy to extend across products.'},
      'fashion-for-ajurs':{title:'Fashion for Ajurs',type:'AI Fashion Photoshoot',year:'2026',image:'https://mir-s3-cdn-cf.behance.net/projects/404/7c14bd244431391.Y3JvcCw4MDgsNjMyLDAsMA.png',behance:'https://www.behance.net/gallery/244431391/Ai-Photoshoot-Fashion-For-Ajurs',brief:'An AI-assisted fashion photoshoot exploring a distinctive editorial world for Ajurs.',challenge:'Maintain consistent art direction, styling and atmosphere while using emerging generative tools.'},
      'overthinking':{title:'OVERTHINKING',type:'Poster Design',year:'2025',image:'https://mir-s3-cdn-cf.behance.net/projects/404/439ea0230891259.Y3JvcCwzODM1LDMwMDAsODUsMA.png',behance:'https://www.behance.net/gallery/230891259/OVERTHINKING-Poster-Design',brief:'An expressive poster study translating the tension and repetition of overthinking into a visual composition.',challenge:'Turn an invisible emotional state into an immediate, memorable and typographically driven image.'}
    };
    const id=new URLSearchParams(location.search).get('id')||'';let item=projects[id];if(!item){const admin=JSON.parse(localStorage.getItem('petroAdminConfig')||'null'),custom=(admin?.customProjects||[]).find(p=>p.title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')===id);if(custom)item={title:custom.title,type:(custom.cat||'Creative Project').toUpperCase(),year:'SELECTED WORK',image:custom.image,behance:custom.url,brief:'A selected creative project by Petro Designer, developed with a clear visual direction and a focus on memorable communication.',challenge:'The work combines concept, craft and a flexible execution designed around the project’s communication goals.'}}
    const root=document.getElementById('project');if(!item){root.innerHTML='<div class="missing"><div><h1>Project not found</h1><a href="index.html#work">Back to projects</a></div></div>'}else{document.title=`${item.title} — Petro Designer`;root.innerHTML=`<section class="hero"><img class="heroImage" src="${item.image}" alt="${item.title}"><div class="heroCopy"><div class="eyebrow"><span>${item.type}</span><span>PETRO DESIGNER / ${item.year}</span></div><h1>${item.title}</h1></div></section><section class="summary"><h2>Built to be seen.<br>Designed to be remembered.</h2><div><p>${item.brief}</p><p style="margin-top:20px">${item.challenge}</p></div></section><section class="facts"><div><small>PROJECT TYPE</small><b>${item.type}</b></div><div><small>YEAR</small><b>${item.year}</b></div><div><small>ROLE</small><b>Art Direction & Design</b></div><div><small>STATUS</small><b>Published</b></div></section><figure class="visual"><img src="${item.image}" alt="${item.title} project artwork"><figcaption class="visualMeta"><span>SELECTED VISUAL</span><span>${item.title.toUpperCase()}</span></figcaption></figure><section class="process"><small>PROJECT PROCESS / 01—04</small><div class="steps"><article><b>01</b><h3>DISCOVERY</h3><p>Understanding the brand, audience and creative opportunity.</p></article><article><b>02</b><h3>DIRECTION</h3><p>Building the central idea and a focused visual territory.</p></article><article><b>03</b><h3>DESIGN</h3><p>Developing the identity, applications and final visual system.</p></article><article><b>04</b><h3>DELIVERY</h3><p>Preparing a clear, consistent set of production-ready assets.</p></article></div></section><section class="cta"><p>FULL PROJECT ARCHIVE</p><h2>SEE EVERY DETAIL.</h2><a href="${item.behance}" target="_blank" rel="noopener">VIEW ORIGINAL ON BEHANCE ↗</a></section>`;const behanceId=(item.behance.match(/gallery\/(\d+)/)||[])[1];if(behanceId){const full=document.createElement('section');full.className='behanceProject'+(id==='visit-siwa-travel'?' siwaFull':'');full.innerHTML=`<div class="behanceProjectHead"><div><small>COMPLETE PROJECT / HIGH QUALITY</small><h2>${id==='visit-siwa-travel'?'Visit Siwa — complete case.':'Full visual story.'}</h2></div><p>All images, layouts and embedded videos are loaded directly from the original Behance presentation.</p></div><iframe class="behanceFrame" src="https://www.behance.net/embed/project/${behanceId}?ilo0=1" title="${item.title} complete project" loading="eager" allow="autoplay; fullscreen" allowfullscreen></iframe>`;root.querySelector('.cta').before(full)}}
    if(item&&id==='visit-siwa-travel'){item.image='asst/Siwa/cover%202.png';const heroImage=root.querySelector('.heroImage'),selectedImage=root.querySelector('.visual img');if(heroImage)heroImage.src=item.image;if(selectedImage)selectedImage.src=item.image;root.querySelector('.behanceProject')?.remove();const assets=[['image','1.png'],['video','logo.mp4'],['video','2.mp4'],['image','3.png'],['video','4.mp4'],...Array.from({length:15},(_,index)=>['image',`${index+4}.png`])];const section=document.createElement('section');section.className='localCase';section.innerHTML=`<div class="localCaseHead"><div><small>VISIT SIWA / COMPLETE CASE STUDY</small><h2>A land that tells<br>a thousand stories.</h2></div><p>The complete identity presentation, campaign visuals and motion pieces â€” served directly from the portfolio in their original quality.</p></div><div class="siwaGallery">${assets.map(([type,file],index)=>type==='video'?`<figure class="siwaMedia in"><video src="asst/Siwa/${file}" autoplay muted loop controls playsinline preload="metadata"></video><figcaption>${String(index+1).padStart(2,'0')} / MOTION</figcaption></figure>`:`<figure class="siwaMedia"><img src="asst/Siwa/${file}" alt="Visit Siwa visual identity artwork ${index+1}" loading="lazy" decoding="async"><figcaption>${String(index+1).padStart(2,'0')} / VISUAL IDENTITY</figcaption></figure>`).join('')}</div>`;root.querySelector('.cta').before(section);const mediaObserver=new IntersectionObserver(entries=>entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add('in');mediaObserver.unobserve(entry.target)}}),{rootMargin:'150px 0px'});section.querySelectorAll('.siwaMedia').forEach(media=>mediaObserver.observe(media));section.querySelectorAll('video').forEach(video=>video.play().catch(()=>{}))}
  </script>
  <script src="site-branding.js"></script>
  <script>
    const themeButton=document.getElementById('themeBtn');
    function setProjectTheme(theme){document.documentElement.dataset.theme=theme;localStorage.setItem('petroTheme',theme);const light=theme==='light';themeButton.textContent=light?'☾':'☀';themeButton.setAttribute('aria-label',light?'Switch to dark mode':'Switch to light mode')}
    setProjectTheme(document.documentElement.dataset.theme);themeButton.addEventListener('click',()=>setProjectTheme(document.documentElement.dataset.theme==='dark'?'light':'dark'));
    const siwaEleven=document.querySelector('.siwaGallery img[src$="/11.png"]')?.closest('.siwaMedia');if(siwaEleven)siwaEleven.parentElement.append(siwaEleven);
  </script>
</body>
</html>
